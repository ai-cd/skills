apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-name-ingress
  labels:
    app: app-name
    managed-by: sealos-skills
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
spec:
  tls:
    - hosts:
        - example.cloud.sealos.io
      secretName: app-name-tls
  rules:
    - host: example.cloud.sealos.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-name-svc
                port:
                  number: 80